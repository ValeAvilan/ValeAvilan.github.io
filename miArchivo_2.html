<!DOCTYPE html>
<html>
<head>
    <title>Clase antes de vacaciones</title>
    <link rel="stylesheet" href="estilos.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="color:bisque;">
  
  <div id ="encabezado"> 
    <h2>Encabezado</h2>
  </div>

  <div id="contenedor">
    <div class="elemento"> Sección 1</div>
    <div class="elemento"> Sección 2</div>
    <div class="elemento"> Sección 3</div>    
  </div> 

  <div id="cuerpo">

  </div>
  <button class="button" type="button" id="uno">Click</button>
  <br><br>
  <button class="button" type="button" id="dos">Mi artista fav</button>
  <br><br>
  <button class="button" type="button" id="tres">Alvaro artista fav</button>
<style >
    
   
</style>

<script >
  let t=1986; //variable que puede cambiar por let
  console.log(t) //imprimir variable 

  const c=12; //varible que no cambia por const

  let p={"titulo":"Llano en llamas","autor":"Juan Rulfo"} //objeto con propiedades, 2 propiedades cada uno con un valor (título y autor)
  console.log(p.autor) //imprimir juan rulfo en consola

  //funcion
  function tripicar(a){
    return 3*a
  }
  
  let d=document.createElement("p"); //crea una etiqueta parrafo
  d.textContent="hola";

  document.getElementById("encabezado").appendChild(d).setAttribute("style","color:blue;"); //a encabezado se le pega d
  
  //trer los datos del archivo json 
  async function obtenerJSON(){
    const respuesta=await fetch('archivo.json'); //-> usar await hace que se trabaje lo demás como en segundo plano en lo que se ejecuta esta tarea
    const datos=await respuesta.json();
    return datos;
  }

  async function mostrarDatos() {
    let datos= await obtenerJSON(); //guardar en datos los elementos de json

    let f=document.createElement("p");
    f.textContent=datos.autor;

    document.getElementById("cuerpo").appendChild(f).setAttribute("style","color:red;");
  }
  mostrarDatos();

  //funcion para imprimir romeo y julieta
  async function webJSON(){
    const respuesta= await fetch("http://openlibrary.org/subjects/love.json?published_in=1500-1600");
    const data=await respuesta.json();

    let r=document.createElement("p"); //r es la etiqueta de parrafo
    r.textContent=data.works[0].title; //contenido de r es data, del array works, [0] es el primer elemento y necesito el title

    document.getElementById("cuerpo").appendChild(r).setAttribute("style","color:red;"); //pegar a la estructura
  }
  webJSON();

  async function webJSON2(){
    const respuesta= await fetch("http://openlibrary.org/subjects/love.json?published_in=1500-1600");
    const data=await respuesta.json();

    let r=document.createElement("p"); //r es la etiqueta de parrafo
    r.textContent=data.works[1].title; //contenido de r es data, del array works, [0] es el primer elemento y necesito el title

    document.getElementById("cuerpo").appendChild(r).setAttribute("style","color:red;"); //pegar a la estructura
  }

  let d2= document.getElementById("uno");
  d2.addEventListener("click",webJSON2); //espera un evento, que es el click y al click llama a la función
  
  
  //FUNCION QUE JALE LA IMAGEN DE MI ARTISTA FAV
  async function artistaFav() {
    let r=document.createElement("img");
    let bio=document.createElement("p");
    const res= await fetch("https://www.theaudiodb.com/api/v1/json/123/search.php?s=bad+bunny");
    const data=await res.json();

    r.src=data.artists[0].strArtistThumb;
    bio.textContent=data.artists[0].strBiography;
    document.getElementById("cuerpo").appendChild(r);
    document.getElementById("cuerpo").appendChild(bio);
  }

  let artist1=document.getElementById("dos");
  artist1.addEventListener("click",artistaFav);
  



  async function alvaroArtista() {
    const respuesta=await fetch("https://www.theaudiodb.com/api/v1/json/123/search.php?s=peso+pluma");
    const data=await respuesta.json();

    let imagen=document.createElement("img");
    let bio=document.createElement("p");

    imagen.src=data.artists[0].strArtistThumb;
    bio.textContent=data.artists[0].strBiography;

    document.getElementById("cuerpo").appendChild(imagen);
    document.getElementById("cuerpo").appendChild(bio);
  }
  let artista2=document.getElementById("tres"); //identificar que con ese boton se va a llamar a esa imagen
  artista2.addEventListener("click",alvaroArtista);
  
  
</script>



</body>
</html>
